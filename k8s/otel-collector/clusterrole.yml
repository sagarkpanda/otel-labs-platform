apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: otel-collector

rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
      - namespaces
      - events
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch

  - nonResourceURLs:
      - /metrics
    verbs:
      - get