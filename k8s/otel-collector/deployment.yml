apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:
        - name: otel-collector

          image: otel/opentelemetry-collector-contrib:latest

          args:
            - "--config=/etc/otelcol-contrib/config.yaml"

          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-secret
                  key: NEW_RELIC_LICENSE_KEY

          ports:
            - name: grpc
              containerPort: 4317

            - name: http
              containerPort: 4318

          volumeMounts:
            - name: collector-config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml

      volumes:
        - name: collector-config
          configMap:
            name: otel-collector-config
