apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      debug:
        verbosity: detailed

      otlphttp/newrelic:
        endpoint: https://otlp.eu01.nr-data.net
        headers:
          api-key: ${env:NEW_RELIC_LICENSE_KEY}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic