apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      debug:
        verbosity: detailed

      otlphttp/newrelic:
        endpoint: https://otlp.eu01.nr-data.net
        headers:
          api-key: ${env:NEW_RELIC_LICENSE_KEY}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - debug
            - otlphttp/newrelic

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:
        - name: otel-collector

          image: otel/opentelemetry-collector-contrib:latest

          args:
            - "--config=/etc/otelcol-contrib/config.yaml"

          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-secret
                  key: NEW_RELIC_LICENSE_KEY

          ports:
            - name: grpc
              containerPort: 4317

            - name: http
              containerPort: 4318

          volumeMounts:
            - name: collector-config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml

      volumes:
        - name: collector-config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector

spec:
  selector:
    app: otel-collector

  type: ClusterIP

  ports:
    - name: grpc
      port: 4317
      targetPort: 4317

    - name: http
      port: 4318
      targetPort: 4318