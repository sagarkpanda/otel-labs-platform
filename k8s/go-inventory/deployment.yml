apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-inventory
  template:
    metadata:
      labels:
        app: go-inventory
    spec:
      containers:
        - name: go-inventory
          image: ghcr.io/sagarkpanda/go-inventory:latest
          ports:
            - containerPort: 8080