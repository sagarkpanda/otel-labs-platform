apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: otel-collector
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/sagarkpanda/otel-labs-platform
    targetRevision: main
    path: k8s/otel-collector

  destination:
    server: https://kubernetes.default.svc
    namespace: otel-labs

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true