name: Trivy Config Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-k8s:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Scan Kubernetes manifests
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./k8s
          format: sarif
          output: trivy-k8s.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-sarif
          path: trivy-k8s.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

  trivy-terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Scan Terraform
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./terraform
          format: sarif
          output: trivy-terraform.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-terraform-sarif
          path: trivy-terraform.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-terraform.sarif
          category: trivy-terraform
